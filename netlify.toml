[build]
  command = ""
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
directory = "netlify/functions"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Fix for scripts in public/ folder
[[redirects]]
  from = "/modals.js"
